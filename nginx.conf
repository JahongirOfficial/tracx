# nginx.conf — Tracx production config for tracx.biznesjon.uz
# Place at: /etc/nginx/sites-available/tracx
# Enable: sudo ln -s /etc/nginx/sites-available/tracx /etc/nginx/sites-enabled/tracx
# SSL:    sudo certbot --nginx -d tracx.biznesjon.uz

# Redirect HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name tracx.biznesjon.uz;

    # Allow Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://tracx.biznesjon.uz$request_uri;
    }
}

# Main HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name tracx.biznesjon.uz;

    ssl_certificate     /etc/letsencrypt/live/tracx.biznesjon.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tracx.biznesjon.uz/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options          "SAMEORIGIN"   always;
    add_header X-Content-Type-Options   "nosniff"      always;
    add_header X-XSS-Protection         "1; mode=block" always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               application/vnd.ms-fontobject application/x-font-ttf font/opentype image/svg+xml;

    # Serve static frontend files
    root /var/www/tracx/client/dist;
    index index.html;

    # Cache static assets (1 year, immutable)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # API proxy → Node.js server (PM2 on port 5001)
    location /api {
        proxy_pass         http://127.0.0.1:5001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
        client_max_body_size 10m;
    }

    # Socket.io WebSocket proxy
    location /socket.io {
        proxy_pass         http://127.0.0.1:5001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_read_timeout 86400s;
    }

    # SPA fallback — all routes served by React Router
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Block hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    access_log /var/log/nginx/tracx_access.log;
    error_log  /var/log/nginx/tracx_error.log;
}
